services:
  # === NATS Hub (central router) ===

  nats-hub:
    image: nats:2-alpine
    volumes:
      - ./nats-hub.conf:/etc/nats/nats.conf
    command: ["--config", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  # === Client-side NATS leaf (SDK connects here) ===

  nats-leaf-client:
    image: nats:2-alpine
    ports:
      - "14225:4225"
    volumes:
      - ./nats-leaf-client.conf:/etc/nats/nats.conf
    command: ["--config", "/etc/nats/nats.conf"]
    depends_on:
      nats-hub:
        condition: service_healthy

  # === Edge node: Ollama + NATS leaf + provider (sidecar) ===

  edge-node:
    build:
      context: ..
      dockerfile: demo/Dockerfile.edge
    environment:
      MODEL: "qwen2.5:0.5b"
    volumes:
      - ollama-models:/root/.ollama
    depends_on:
      nats-hub:
        condition: service_healthy

volumes:
  ollama-models:
