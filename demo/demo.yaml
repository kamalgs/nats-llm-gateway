nats:
  url: "${NATS_URL:-nats://localhost:4222}"

models:
  "gpt-4o":
    provider: openai
    upstream_model: "gpt-4o-2024-08-06"
  "gpt-4o-mini":
    provider: openai
    upstream_model: "gpt-4o-mini-2024-07-18"
  "claude-sonnet":
    provider: anthropic
    upstream_model: "claude-sonnet-4-20250514"
  "claude-haiku":
    provider: anthropic
    upstream_model: "claude-haiku-4-5-20251001"
  "llama3":
    provider: ollama
    upstream_model: "llama3:8b"
  "mistral":
    provider: ollama
    upstream_model: "mistral:7b"

providers:
  openai:
    base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    api_key: "${OPENAI_API_KEY:-mock-key}"
  anthropic:
    base_url: "${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
    api_key: "${ANTHROPIC_API_KEY:-mock-key}"
  ollama:
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434/v1}"
    api_key: ""
